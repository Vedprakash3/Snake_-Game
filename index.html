<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game Final</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial;
  color: white;
}

h2 { margin: 10px; }

canvas {
  background: #000;
  border: 2px solid lime;
  width: 90vw;
  height: 90vw;
  max-width: 400px;
  max-height: 400px;
}

/* 🔥 BIG MOBILE BUTTONS */
.controls {
  margin-top: 15px;
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 12px;
}

button {
  padding: 22px;
  font-size: 26px;
  background: #222;
  color: white;
  border: 2px solid lime;
  border-radius: 14px;
  touch-action: manipulation;
}

button:active {
  transform: scale(0.95);
  background: #333;
}
</style>
</head>

<body>

<h2>🐍 Snake Game (Final Pro)</h2>
<div id="score">Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
  <div></div>
  <button onclick="setDir('UP')">⬆️</button>
  <div></div>

  <button onclick="setDir('LEFT')">⬅️</button>
  <button onclick="setDir('DOWN')">⬇️</button>
  <button onclick="setDir('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake, dir, food, score;

function init() {
  snake = [{x: 200, y: 200}];
  dir = "RIGHT";
  score = 0;
  food = spawnFood();
  document.getElementById("score").innerText = "Score: 0";
}

function spawnFood() {
  return {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
  };
}

// keyboard controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") setDir("UP");
  if (e.key === "ArrowDown") setDir("DOWN");
  if (e.key === "ArrowLeft") setDir("LEFT");
  if (e.key === "ArrowRight") setDir("RIGHT");
});

function setDir(d) {
  if (d === "LEFT" && dir !== "RIGHT") dir = "LEFT";
  if (d === "RIGHT" && dir !== "LEFT") dir = "RIGHT";
  if (d === "UP" && dir !== "DOWN") dir = "UP";
  if (d === "DOWN" && dir !== "UP") dir = "DOWN";
}

function collision(head, arr) {
  return arr.some(s => s.x === head.x && s.y === head.y);
}

function wrap(v) {
  if (v < 0) return 400 - box;
  if (v >= 400) return 0;
  return v;
}

/* 🐍 smooth snake */
function drawSnake() {
  for (let i = 0; i < snake.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.arc(
      snake[i].x + box/2,
      snake[i].y + box/2,
      box/2 - 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

/* 🍎 food */
function drawFood() {
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);
}

/* 🎮 game loop */
function gameLoop() {
  ctx.clearRect(0,0,400,400);

  drawSnake();
  drawFood();

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (dir === "LEFT") headX -= box;
  if (dir === "RIGHT") headX += box;
  if (dir === "UP") headY -= box;
  if (dir === "DOWN") headY += box;

  headX = wrap(headX);
  headY = wrap(headY);

  let newHead = {x: headX, y: headY};

  // self collision
  if (collision(newHead, snake)) {
    alert("Game Over 💀 Snake hit itself!");
    return init();
  }

  // eat food
  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    food = spawnFood();
  } else {
    snake.pop();
  }

  snake.unshift(newHead);
}

init();
setInterval(gameLoop, 680); // 🐌 slow smooth speed
</script>

</body>
</html>
